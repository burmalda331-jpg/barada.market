<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>барада.маркет</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0d0d14"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="барада.маркет"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg0:#07070f;--bg1:#0d0d1a;--bg2:#131325;--bg3:#1a1a30;--bg4:#222240;
  --c1:#6c63ff;--c2:#ff3d9a;--c3:#00f0c8;--c4:#ffd700;--c5:#ff6b35;
  --glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.07);--border2:rgba(108,99,255,0.3);
  --text:#f0f0ff;--text2:#8888aa;--text3:#44445a;
  --red:#ff4757;--green:#2ed573;--yellow:#ffd700;
  --r:18px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--text);font-family:var(--font)}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.4}

/* ── AUTH ── */
#auth{display:flex;align-items:flex-end;justify-content:center;position:fixed;inset:0;z-index:10;
  background:radial-gradient(ellipse at 30% 0%,rgba(108,99,255,0.2),transparent 60%),
             radial-gradient(ellipse at 80% 100%,rgba(255,61,154,0.15),transparent 50%),
             var(--bg0)}
.auth-card{width:100%;max-width:480px;background:linear-gradient(160deg,var(--bg2),var(--bg1));
  border:1px solid var(--border2);border-radius:28px 28px 0 0;
  padding:24px 22px calc(28px + var(--safe-bottom));
  box-shadow:0 -16px 80px rgba(108,99,255,0.15),0 -2px 0 rgba(108,99,255,0.4);
  overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:92vh}
.auth-card::-webkit-scrollbar{display:none}
.logo{text-align:center;margin-bottom:24px;position:relative}
.logo-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:120px;height:120px;background:radial-gradient(circle,rgba(108,99,255,0.3),transparent 70%);
  border-radius:50%;pointer-events:none}
.logo-icon{font-size:58px;display:block;margin-bottom:10px;position:relative;filter:drop-shadow(0 0 20px rgba(108,99,255,0.5))}
.logo-title{font-size:26px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:12px;color:var(--text2);margin-top:4px;font-weight:500}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:1px}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:.2s;font-family:var(--font);font-weight:500}
.field input:focus,.field select:focus{border-color:var(--c1);background:var(--bg4);box-shadow:0 0 0 3px rgba(108,99,255,0.1)}
.btn{width:100%;background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;
  font-size:15px;font-weight:800;padding:15px;border-radius:16px;cursor:pointer;
  transition:.15s;font-family:var(--font);letter-spacing:.3px;
  box-shadow:0 4px 24px rgba(108,99,255,0.3)}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 32px rgba(108,99,255,0.4)}
.btn:active{transform:scale(.97);opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}
.auth-switch span{color:var(--c1);cursor:pointer;font-weight:700}
.err{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;min-height:18px;font-weight:600}

/* ── APP ── */
#app{display:none;flex-direction:column;position:fixed;top:0;left:0;right:0;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{background:rgba(7,7,15,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;z-index:5}
.topbar-logo{font-size:18px;font-weight:900;letter-spacing:-0.5px;flex:1;
  background:linear-gradient(90deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-notif{position:relative}
.notif-dot{position:absolute;top:0;right:0;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg0)}
.topbar-icon-btn{width:36px;height:36px;border-radius:12px;background:var(--glass2);
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;
  border:1px solid var(--border);transition:.15s}
.topbar-icon-btn:hover{background:var(--glass);border-color:var(--border2)}
.topbar-av{width:36px;height:36px;border-radius:12px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;
  overflow:hidden;flex-shrink:0;border:1px solid var(--border2)}
.topbar-av img{width:100%;height:100%;object-fit:cover}
.dev-pill{background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;
  font-size:11px;font-weight:800;padding:7px 12px;border-radius:10px;cursor:pointer;
  font-family:var(--font);letter-spacing:.3px;white-space:nowrap}

/* ── NAV ── */
.nav-tabs{display:flex;background:rgba(7,7,15,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);flex-shrink:0}
.nav-tab{flex:1;padding:10px 4px 9px;text-align:center;font-size:11px;font-weight:700;color:var(--text3);
  cursor:pointer;transition:.15s;position:relative;letter-spacing:.3px}
.nav-tab.on{color:var(--c1)}
.nav-tab.on::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:2px;
  background:linear-gradient(90deg,var(--c1),var(--c2));border-radius:2px}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;
  padding-bottom:calc(16px + var(--safe-bottom))}
.content::-webkit-scrollbar{display:none}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:14px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.search-bar{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:14px;
  padding:11px 14px 11px 42px;color:var(--text);font-size:14px;outline:none;
  font-family:var(--font);font-weight:500;transition:.2s}
.search-bar:focus{border-color:var(--c1);background:var(--bg3);box-shadow:0 0 0 3px rgba(108,99,255,0.08)}

/* ── CATEGORIES ── */
.cats{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.cats::-webkit-scrollbar{display:none}
.cat{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;
  font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;transition:.15s;flex-shrink:0;letter-spacing:.3px}
.cat.on{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(108,99,255,0.3)}

/* ── FEATURED BANNER ── */
.featured{border-radius:22px;overflow:hidden;margin-bottom:20px;position:relative;cursor:pointer;
  background:linear-gradient(135deg,#0f0f2a,#1a0f2a);
  border:1px solid rgba(108,99,255,0.2);min-height:160px}
.featured-bg{position:absolute;inset:0;pointer-events:none}
.featured-blob1{position:absolute;top:-30px;right:-30px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(108,99,255,0.35),transparent 70%);border-radius:50%}
.featured-blob2{position:absolute;bottom:-40px;left:-20px;width:140px;height:140px;
  background:radial-gradient(circle,rgba(255,61,154,0.25),transparent 70%);border-radius:50%}
.featured-content{position:relative;padding:20px}
.featured-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;
  color:var(--c4);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;
  background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:6px;padding:3px 8px}
.featured-name{font-size:22px;font-weight:900;margin-bottom:4px;letter-spacing:-0.5px}
.featured-desc{font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.5;font-weight:500}
.featured-meta{display:flex;align-items:center;gap:10px}
.featured-btn{background:linear-gradient(135deg,var(--c1),var(--c2));border:none;color:#fff;
  font-size:12px;font-weight:800;padding:9px 20px;border-radius:10px;cursor:pointer;font-family:var(--font)}
.featured-rating{font-size:13px;color:var(--c4)}
.featured-size{font-size:11px;color:var(--text2);font-family:var(--mono)}

/* ── SECTION HEADER ── */
.sec-head{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;letter-spacing:-.2px}
.sec-see-all{font-size:11px;color:var(--c1);cursor:pointer;font-weight:700}

/* ── APPS GRID ── */
.apps-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* ── APP CARD ── */
.app-card{background:var(--bg1);border:1px solid var(--border);border-radius:20px;
  overflow:hidden;cursor:pointer;transition:.2s;position:relative;
  box-shadow:0 2px 16px rgba(0,0,0,0.3)}
.app-card:active{transform:scale(.96);opacity:.85}
.app-card-hover{border-color:rgba(108,99,255,0.3)}
.app-icon-wrap{width:100%;aspect-ratio:1;background:var(--bg2);display:flex;align-items:center;
  justify-content:center;font-size:52px;position:relative;overflow:hidden}
.app-icon-wrap img{width:100%;height:100%;object-fit:cover}
.app-icon-wrap::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 50%,rgba(0,0,0,0.5));pointer-events:none}
.app-body{padding:10px 11px 12px}
.app-name{font-size:13px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.app-dev{font-size:10px;color:var(--text2);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.app-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.app-rating{font-size:11px;color:var(--yellow)}
.app-price{font-size:11px;font-weight:800}
.app-price.free{color:var(--green)}
.app-get{background:var(--glass2);border:1px solid var(--border2);color:var(--c1);
  font-size:11px;font-weight:800;padding:5px 12px;border-radius:8px;cursor:pointer;
  font-family:var(--font);transition:.15s;white-space:nowrap}
.app-get:hover{background:var(--c1);color:#fff;border-color:var(--c1)}
.app-badge{position:absolute;top:8px;left:8px;
  font-size:9px;font-weight:800;padding:3px 7px;border-radius:6px;backdrop-filter:blur(10px);letter-spacing:.5px}
.app-badge.hot{background:rgba(255,71,87,0.85);color:#fff}
.app-badge.new{background:rgba(46,213,115,0.85);color:#fff}
.app-badge.top{background:rgba(255,215,0,0.85);color:#000}
.app-badge.paid{background:rgba(108,99,255,0.85);color:#fff}

/* ── HORIZONTAL LIST ── */
.h-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px}
.h-list::-webkit-scrollbar{display:none}
.h-app-card{width:120px;flex-shrink:0;cursor:pointer;transition:.15s}
.h-app-card:active{transform:scale(.94)}
.h-app-icon{width:120px;height:120px;border-radius:22px;background:var(--bg2);display:flex;align-items:center;
  justify-content:center;font-size:52px;margin-bottom:8px;overflow:hidden;border:1px solid var(--border)}
.h-app-icon img{width:100%;height:100%;object-fit:cover;border-radius:22px}
.h-app-name{font-size:12px;font-weight:700;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.h-app-sub{font-size:10px;color:var(--text2);text-align:center;font-weight:600}

/* ── DEV PANEL ── */
.dev-panel{background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:16px;margin-bottom:14px}
.dev-title{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;letter-spacing:-.2px}
.dev-stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.dev-stat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center}
.dev-stat-val{font-size:20px;font-weight:900;color:var(--c1)}
.dev-stat-label{font-size:10px;color:var(--text2);font-weight:600;margin-top:2px}
.dev-app-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.dev-app-icon{width:50px;height:50px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden}
.dev-app-icon img{width:100%;height:100%;object-fit:cover;border-radius:14px}
.dev-app-info{flex:1;min-width:0}
.dev-app-name{font-size:13px;font-weight:800;margin-bottom:3px}
.dev-app-stats{font-size:10px;color:var(--text2);font-family:var(--mono)}
.dev-app-acts{display:flex;gap:6px}
.btn-sm{padding:7px 12px;border-radius:8px;border:none;font-size:11px;font-weight:800;cursor:pointer;font-family:var(--font);transition:.15s;letter-spacing:.2px}
.btn-edit{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-del{background:rgba(255,71,87,0.12);color:var(--red);border:1px solid rgba(255,71,87,0.2)}
.badge-status{display:inline-block;font-size:9px;font-weight:800;padding:2px 8px;border-radius:6px;margin-left:6px;letter-spacing:.5px}
.badge-pub{background:rgba(46,213,115,0.15);color:var(--green)}
.badge-rev{background:rgba(255,215,0,0.15);color:var(--yellow)}
.badge-rej{background:rgba(255,71,87,0.15);color:var(--red)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;
  justify-content:center;z-index:100;animation:fadeIn .2s;backdrop-filter:blur(4px)}
.modal{background:linear-gradient(160deg,var(--bg2),var(--bg1));
  border:1px solid var(--border2);border-radius:28px 28px 0 0;
  padding:20px 20px calc(36px + var(--safe-bottom));
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  animation:slideUp .28s cubic-bezier(.16,1,.3,1);
  box-shadow:0 -8px 60px rgba(108,99,255,0.2)}
.modal::-webkit-scrollbar{display:none}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}
.modal h2{font-size:18px;font-weight:900;margin-bottom:14px;letter-spacing:-.5px}
.m-foot{display:flex;gap:8px;margin-top:18px}
.btn-cancel{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);
  font-size:14px;font-weight:700;padding:13px;border-radius:14px;cursor:pointer;font-family:var(--font)}
.field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:14px;
  padding:12px 16px;color:var(--text);font-size:14px;outline:none;resize:none;
  font-family:var(--font);line-height:1.6;font-weight:500;transition:.2s}
.field textarea:focus{border-color:var(--c1);background:var(--bg4)}

/* ── UPLOAD BOX ── */
.upload-box{border:2px dashed var(--border2);border-radius:16px;padding:24px;text-align:center;
  color:var(--text2);font-size:13px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.upload-box:hover{border-color:var(--c1);color:var(--c1);background:rgba(108,99,255,0.05)}
.upload-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-box .upload-icon{font-size:32px;margin-bottom:8px}
.upload-box .upload-label{font-weight:700;font-size:12px}
.upload-preview{width:80px;height:80px;border-radius:16px;object-fit:cover;margin:10px auto 0;display:block}
.upload-filename{font-size:11px;color:var(--green);font-family:var(--mono);margin-top:8px;font-weight:600}
.upload-progress{background:var(--bg3);border-radius:8px;height:6px;margin-top:10px;overflow:hidden}
.upload-progress-bar{height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));border-radius:8px;transition:width .3s;width:0%}

/* ── PRICE ROW ── */
.price-row{display:flex;gap:8px;align-items:center}
.free-toggle{padding:11px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);
  color:var(--text);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:.15s}
.free-toggle.on{background:rgba(46,213,115,0.12);border-color:var(--green);color:var(--green)}

/* ── INFO BOX ── */
.info-box{background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);border-radius:14px;
  padding:12px 14px;font-size:12px;color:rgba(150,150,255,0.9);line-height:1.6;margin-bottom:12px;font-weight:500}
.warn-box{background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:14px;
  padding:12px 14px;font-size:12px;color:rgba(255,215,0,0.9);line-height:1.6;margin-bottom:12px;font-weight:500}

/* ── APP DETAIL ── */
.app-detail-hero{width:100%;height:200px;background:var(--bg2);border-radius:18px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;font-size:80px;overflow:hidden;position:relative}
.app-detail-hero img{width:100%;height:100%;object-fit:cover}
.app-detail-hero::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(13,13,26,0.9))}
.app-detail-over{position:absolute;bottom:14px;left:14px;right:14px}
.app-detail-head{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.app-detail-icon{width:72px;height:72px;border-radius:18px;background:var(--bg2);
  display:flex;align-items:center;justify-content:center;font-size:42px;
  flex-shrink:0;overflow:hidden;border:2px solid var(--border2)}
.app-detail-icon img{width:100%;height:100%;object-fit:cover;border-radius:18px}
.app-detail-info{flex:1}
.app-detail-name{font-size:19px;font-weight:900;margin-bottom:2px;letter-spacing:-.5px}
.app-detail-dev{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.app-detail-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px;font-weight:500}
.app-meta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.app-meta-item{background:var(--bg2);border-radius:12px;padding:10px;text-align:center}
.app-meta-label{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.app-meta-val{font-size:13px;font-weight:800;margin-top:3px}
.screenshots{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.screenshots::-webkit-scrollbar{display:none}
.screenshot{width:120px;height:200px;background:var(--bg2);border-radius:14px;flex-shrink:0;
  overflow:hidden;border:1px solid var(--border)}
.screenshot img{width:100%;height:100%;object-fit:cover}
.reviews-section{margin-bottom:16px}
.review-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:12px;margin-bottom:8px}
.review-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.review-av{width:28px;height:28px;border-radius:8px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px}
.review-name{font-size:12px;font-weight:700;flex:1}
.review-stars{font-size:11px;color:var(--yellow)}
.review-text{font-size:12px;color:var(--text2);line-height:1.5;font-weight:500}

/* ── PAYMENT ── */
.payment-methods{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.pay-method{background:var(--bg2);border:2px solid var(--border);border-radius:14px;padding:14px;
  cursor:pointer;transition:.15s;display:flex;align-items:center;gap:12px}
.pay-method:hover{border-color:var(--c1)}
.pay-method.selected{border-color:var(--c1);background:rgba(108,99,255,0.08)}
.pay-method-icon{font-size:24px;width:40px;text-align:center}
.pay-method-info{flex:1}
.pay-method-name{font-size:14px;font-weight:700}
.pay-method-sub{font-size:11px;color:var(--text2);font-weight:600}
.pay-method-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:.15s}
.pay-method.selected .pay-method-check{background:var(--c1);border-color:var(--c1);color:#fff;font-size:11px}
.pay-total{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px}
.pay-total-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:4px}
.pay-total-row.big{font-size:16px;font-weight:800;border-top:1px solid var(--border);margin-top:10px;padding-top:10px}
.card-form{display:none;flex-direction:column;gap:10px;margin-top:10px}
.card-form.show{display:flex}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state .big{font-size:56px;margin-bottom:14px}
.empty-state h3{font-size:17px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-.3px}
.empty-state p{font-size:13px;font-weight:500}

/* ── DOWNLOAD PROGRESS ── */
.dl-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);
  animation:fadeIn .2s}
.dl-card{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;padding:30px 28px;
  max-width:320px;width:90%;text-align:center}
.dl-icon{font-size:56px;margin-bottom:14px;display:block}
.dl-name{font-size:16px;font-weight:800;margin-bottom:4px}
.dl-status{font-size:12px;color:var(--text2);margin-bottom:20px;font-weight:500}
.dl-bar-wrap{background:var(--bg3);border-radius:8px;height:8px;overflow:hidden;margin-bottom:12px}
.dl-bar{height:100%;background:linear-gradient(90deg,var(--c1),var(--c2));border-radius:8px;transition:width .2s;width:0%}
.dl-pct{font-size:12px;color:var(--c1);font-family:var(--mono);font-weight:600}

/* ── ANIMATIONS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
.pulse{animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-glow"></div>
      <span class="logo-icon">🕹️</span>
      <div class="logo-title">барада.маркет</div>
      <div class="logo-sub">Войди через аккаунт барада.чат</div>
    </div>
    <div class="err" id="err"></div>
    <div class="field"><label>Логин</label><input id="a-login" placeholder="твой_логин" autocomplete="username"/></div>
    <div class="field"><label>Пароль</label><input id="a-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" onclick="doLogin()" id="login-btn">Войти →</button>
    <div class="auth-switch">Нет аккаунта? <span onclick="window.open('https://burmalda331-jpg.github.io/barada-chat/','_blank')">Зарегистрируйся</span></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">🕹️ барада.маркет</div>
    <button class="dev-pill" id="dev-btn" onclick="openDevPanel()" style="display:none">⚙️ Девелопер</button>
    <div class="topbar-av" id="me-av" onclick="showProfileMenu()" title="Профиль"></div>
  </div>
  <div class="nav-tabs">
    <div class="nav-tab on" onclick="switchTab('home',this)">🏠&nbsp;Главная</div>
    <div class="nav-tab" onclick="switchTab('games',this)">🎮&nbsp;Игры</div>
    <div class="nav-tab" onclick="switchTab('apps',this)">📱&nbsp;Апп</div>
    <div class="nav-tab" onclick="switchTab('myapps',this)">📦&nbsp;Мои</div>
  </div>
  <div class="content" id="content"></div>
</div>

<div id="modal-root"></div>
<div id="dl-root"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SUPABASE_URL      = 'https://bhmfdzmtviuatsxwjxap.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJobWZkem10dml1YXRzeHdqeGFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTAyMjMsImV4cCI6MjA5NjE2NjIyM30.dDTcKX1ryRP0ZVgTaNDYyPqUg71KjXtgjh9wfPH3YNc';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ADMIN_USERNAME = 'burmalda331';

let me = null;
let currentTab = 'home';
let allApps = [];
let filterCat = 'all';
let isDev = false;

// ── HELPERS ─────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showErr(msg){ document.getElementById('err').textContent = msg||''; }

function showModal(html){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

function emptyHtml(title, sub){
  return `<div class="empty-state" style="grid-column:1/-1">
    <div class="big">🔍</div><h3>${title}</h3><p>${sub}</p>
  </div>`;
}

function fmtSize(bytes){
  if(!bytes) return '—';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(0)+'&nbsp;KB';
  return (bytes/1024/1024).toFixed(1)+'&nbsp;MB';
}

// ── AUTH ─────────────────────────────────────────────────────────
async function doLogin(){
  const login = document.getElementById('a-login').value.trim();
  const pass  = document.getElementById('a-pass').value;
  if(!login||!pass){showErr('Заполни все поля');return;}
  const btn = document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Входим...'; showErr('');
  try{
    const {data:prof} = await sb.from('profiles').select('id,name,avatar,avatar_url,username')
      .eq('username',login).maybeSingle();
    if(!prof) throw new Error('Пользователь не найден');
    let {data,error} = await sb.auth.signInWithPassword({email:login+'@barada.chat',password:pass});
    if(error) throw new Error('Неверный логин или пароль');
    const {data:profile} = await sb.from('profiles').select('*').eq('id',data.user.id).single();
    me = profile;
    await startApp();
  }catch(e){showErr(e.message);}
  finally{btn.disabled=false;btn.textContent='Войти →';}
}

async function startApp(){
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='flex';
  const av = document.getElementById('me-av');
  av.innerHTML = me.avatar_url ? `<img src="${me.avatar_url}"/>` : (me.avatar||'👤');
  av.title = '@'+me.username+' · Профиль';
  // Проверяем: разработчик?
  isDev = me.username === ADMIN_USERNAME;
  if(!isDev){
    const {data} = await sb.from('developer_accounts').select('id').eq('user_id',me.id).maybeSingle();
    isDev = !!data;
  }
  if(isDev) document.getElementById('dev-btn').style.display='block';
  await loadApps();
  renderTab('home');
}

async function logout(){
  await sb.auth.signOut();
  me=null; allApps=[]; isDev=false;
  document.getElementById('app').style.display='none';
  document.getElementById('auth').style.display='flex';
}

function showProfileMenu(){
  showModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <h2>👤 Профиль</h2>
    <div style="display:flex;align-items:center;gap:14px;background:var(--bg2);border-radius:16px;padding:14px;margin-bottom:16px">
      <div style="width:56px;height:56px;border-radius:16px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;flex-shrink:0">
        ${me.avatar_url?`<img src="${me.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:16px"/>`:me.avatar||'👤'}
      </div>
      <div>
        <div style="font-size:16px;font-weight:800">${esc(me.name||me.username)}</div>
        <div style="font-size:12px;color:var(--text2);font-family:var(--mono);font-weight:600">@${esc(me.username)}</div>
        ${isDev?'<div style="font-size:10px;color:var(--c1);font-weight:800;margin-top:4px">⚡ Разработчик</div>':''}
      </div>
    </div>
    ${!isDev ? `<button class="btn" style="margin-bottom:10px;background:linear-gradient(135deg,#1a1a30,#22223a);border:1px solid var(--border2);box-shadow:none;color:var(--c1)" onclick="applyDev()">⚡ Стать разработчиком</button>` : ''}
    <button class="btn" style="background:rgba(255,71,87,0.15);border:1px solid rgba(255,71,87,0.3);box-shadow:none;color:var(--red)" onclick="closeModal();logout()">Выйти из аккаунта</button>
    <div class="m-foot"><button class="btn-cancel" onclick="closeModal()">Закрыть</button></div>
  </div>`);
}

async function applyDev(){
  await sb.from('developer_accounts').upsert({user_id:me.id},{onConflict:'user_id'});
  isDev = true;
  document.getElementById('dev-btn').style.display='block';
  closeModal();
  alert('✅ Теперь ты разработчик! Используй кнопку "Девелопер".');
}

// ── LOAD APPS ────────────────────────────────────────────────────
async function loadApps(){
  const {data} = await sb.from('market_apps')
    .select('*,profiles!developer_id(name,username,avatar,avatar_url)')
    .eq('status','published')
    .order('created_at',{ascending:false});
  allApps = data||[];
}

// ── TABS ─────────────────────────────────────────────────────────
function switchTab(tab, el){
  currentTab=tab; filterCat='all';
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  renderTab(tab);
}
function renderTab(tab){
  if(tab==='home') renderHome();
  else if(tab==='games') renderCatalog('game');
  else if(tab==='apps') renderCatalog('app');
  else if(tab==='myapps') renderMyApps();
}

// ── HOME ─────────────────────────────────────────────────────────
function renderHome(){
  const c = document.getElementById('content');
  const featured = allApps.find(a=>a.featured) || allApps[0];
  const topGames = allApps.filter(a=>a.type==='game').slice(0,8);
  const topApps  = allApps.filter(a=>a.type==='app').slice(0,8);
  const newAll   = [...allApps].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,6);

  c.innerHTML = `
    ${featured ? `
    <div class="featured" onclick="openAppDetail('${featured.id}')">
      <div class="featured-bg">
        <div class="featured-blob1"></div>
        <div class="featured-blob2"></div>
      </div>
      <div class="featured-content">
        <div class="featured-tag">🔥 Топ недели</div>
        <div class="featured-name">${esc(featured.icon_emoji||'📦')} ${esc(featured.name)}</div>
        <div class="featured-desc">${esc((featured.description||'').slice(0,90))}${(featured.description||'').length>90?'...':''}</div>
        <div class="featured-meta">
          <button class="featured-btn" onclick="event.stopPropagation();openAppDetail('${featured.id}')">Подробнее</button>
          ${featured.rating?`<span class="featured-rating">⭐ ${featured.rating.toFixed(1)}</span>`:''}
          ${featured.file_size?`<span class="featured-size">${fmtSize(featured.file_size)}</span>`:''}
        </div>
      </div>
    </div>` : ''}

    ${topGames.length ? `
    <div class="sec-head"><span>🎮 Популярные игры</span><span class="sec-see-all" onclick="switchTabById('games')">Все →</span></div>
    <div class="h-list">${topGames.map(a=>hAppCardHtml(a)).join('')}</div>
    ` : ''}

    ${topApps.length ? `
    <div class="sec-head"><span>📱 Приложения</span><span class="sec-see-all" onclick="switchTabById('apps')">Все →</span></div>
    <div class="apps-grid">${topApps.slice(0,4).map(a=>appCardHtml(a)).join('')}</div>
    ` : ''}

    ${newAll.length ? `
    <div class="sec-head" style="margin-top:20px"><span>🆕 Новинки</span></div>
    <div class="apps-grid">${newAll.map(a=>appCardHtml(a)).join('')}</div>
    ` : ''}

    ${!allApps.length ? emptyHtml('Маркет пустой','Будь первым разработчиком!') : ''}
  `;
}

function switchTabById(tab){
  const idx = {home:0,games:1,apps:2,myapps:3}[tab]||0;
  const tabs = document.querySelectorAll('.nav-tab');
  tabs.forEach(t=>t.classList.remove('on'));
  tabs[idx].classList.add('on');
  currentTab=tab; filterCat='all';
  renderTab(tab);
}

// ── CATALOG ─────────────────────────────────────────────────────
const CATS_GAME = ['all','action','rpg','puzzle','racing','strategy','arcade','survival','shooter'];
const CATS_APP  = ['all','tools','social','music','education','finance','video','other'];
const CATS_LABEL = {all:'Все',action:'Экшн',rpg:'РПГ',puzzle:'Головоломки',racing:'Гонки',
  strategy:'Стратегии',arcade:'Аркады',survival:'Выживание',shooter:'Шутер',
  tools:'Инструменты',social:'Социальные',music:'Музыка',education:'Учёба',
  finance:'Финансы',video:'Видео',other:'Разное'};

function renderCatalog(type){
  const c = document.getElementById('content');
  const cats = type==='game' ? CATS_GAME : CATS_APP;
  const filtered = allApps.filter(a=>a.type===type && (filterCat==='all'||a.category===filterCat));
  c.innerHTML = `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-bar" id="catalog-search" placeholder="Поиск..." oninput="filterCatalog('${type}')"/>
    </div>
    <div class="cats">${cats.map(cat=>`<div class="cat${filterCat===cat?' on':''}" onclick="setCat('${cat}','${type}')">${CATS_LABEL[cat]||cat}</div>`).join('')}</div>
    <div class="apps-grid" id="catalog-grid">
      ${filtered.map(a=>appCardHtml(a)).join('') || emptyHtml('Ничего не найдено','Попробуй другую категорию')}
    </div>
  `;
}
function setCat(cat,type){ filterCat=cat; renderCatalog(type); }
function filterCatalog(type){
  const q=(document.getElementById('catalog-search')?.value||'').toLowerCase();
  const filtered=allApps.filter(a=>a.type===type
    &&(filterCat==='all'||a.category===filterCat)
    &&(a.name.toLowerCase().includes(q)||(a.description||'').toLowerCase().includes(q)));
  document.getElementById('catalog-grid').innerHTML=
    filtered.map(a=>appCardHtml(a)).join('')||emptyHtml('Ничего не найдено','');
}

// ── MY APPS ──────────────────────────────────────────────────────
async function renderMyApps(){
  const c = document.getElementById('content');
  c.innerHTML=`<div style="text-align:center;padding:40px;color:var(--text2)"><span class="spin" style="display:inline-block;font-size:28px">⚙️</span></div>`;
  const [{data:installed},{data:devApps}] = await Promise.all([
    sb.from('app_installs').select('app_id,market_apps(*)').eq('user_id',me.id),
    sb.from('market_apps').select('*').eq('developer_id',me.id)
  ]);
  const myInstalled = (installed||[]).map(r=>r.market_apps).filter(Boolean);
  const totalInstalls = (devApps||[]).reduce((s,a)=>s+(a.install_count||0),0);
  const totalRevenue = (devApps||[]).reduce((s,a)=>s+(a.price||0)*(a.purchase_count||0),0);

  c.innerHTML = `
    ${(devApps?.length||isDev) ? `
    <div class="dev-panel">
      <div class="dev-title">👨‍💻 Мои публикации</div>
      ${devApps?.length ? `
      <div class="dev-stats-row">
        <div class="dev-stat"><div class="dev-stat-val">${devApps.length}</div><div class="dev-stat-label">Приложений</div></div>
        <div class="dev-stat"><div class="dev-stat-val">${totalInstalls}</div><div class="dev-stat-label">Установок</div></div>
        <div class="dev-stat"><div class="dev-stat-val">${totalRevenue>0?totalRevenue+'₽':'—'}</div><div class="dev-stat-label">Доход</div></div>
      </div>` : ''}
      ${(devApps||[]).map(a=>`
      <div class="dev-app-card">
        <div class="dev-app-icon">${a.icon_url?`<img src="${a.icon_url}"/>`:(a.icon_emoji||'📦')}</div>
        <div class="dev-app-info">
          <div class="dev-app-name">${esc(a.name)}<span class="badge-status ${a.status==='published'?'badge-pub':a.status==='rejected'?'badge-rej':'badge-rev'}">${a.status==='published'?'Опубл.':a.status==='rejected'?'Откл.':'На проверке'}</span></div>
          <div class="dev-app-stats">📥 ${a.install_count||0} · ${a.price>0?a.price+' ₽':'Бесплатно'} · ${fmtSize(a.file_size)}</div>
        </div>
        <div class="dev-app-acts">
          <button class="btn-sm btn-edit" onclick="openPublishApp('${a.id}')">✏️</button>
          <button class="btn-sm btn-del" onclick="deleteApp('${a.id}')">🗑️</button>
        </div>
      </div>`).join('')}
      <button class="btn" onclick="openPublishApp()">➕ Опубликовать</button>
    </div>` : ''}

    <div class="sec-head"><span>📥 Установленные (${myInstalled.length})</span></div>
    ${myInstalled.length
      ? `<div class="apps-grid">${myInstalled.map(a=>appCardHtml(a)).join('')}</div>`
      : emptyHtml('Нет установленных','Зайди в каталог и скачай что-нибудь!')}
  `;
}

// ── CARD HTML ────────────────────────────────────────────────────
function appCardHtml(a){
  const rating = a.rating ? '⭐&thinsp;'+a.rating.toFixed(1) : '⭐ Новое';
  const price  = a.price>0 ? a.price+' ₽' : 'Бесплатно';
  const icon   = a.icon_url ? `<img src="${a.icon_url}"/>` : (a.icon_emoji||'📦');
  let badge = '';
  if(a.price>0) badge = `<div class="app-badge paid">ПЛАТНОЕ</div>`;
  else if(a.install_count>100) badge = `<div class="app-badge hot">🔥 ХИТ</div>`;
  else if(isNew(a.created_at)) badge = `<div class="app-badge new">НОВОЕ</div>`;
  return `<div class="app-card" onclick="openAppDetail('${a.id}')">
    <div class="app-icon-wrap">${icon}</div>
    ${badge}
    <div class="app-body">
      <div class="app-name">${esc(a.name)}</div>
      <div class="app-dev">${esc(a.profiles?.name||'Разработчик')}</div>
      <div class="app-row">
        <span class="app-rating">${rating}</span>
        <span class="app-price${a.price>0?'':' free'}">${price}</span>
      </div>
    </div>
  </div>`;
}

function hAppCardHtml(a){
  const icon = a.icon_url ? `<img src="${a.icon_url}"/>` : (a.icon_emoji||'📦');
  return `<div class="h-app-card" onclick="openAppDetail('${a.id}')">
    <div class="h-app-icon">${icon}</div>
    <div class="h-app-name">${esc(a.name)}</div>
    <div class="h-app-sub">${a.price>0?a.price+' ₽':'Бесплатно'}</div>
  </div>`;
}

function isNew(dateStr){
  return (Date.now() - new Date(dateStr).getTime()) < 7*24*3600*1000;
}

// ── APP DETAIL ───────────────────────────────────────────────────
async function openAppDetail(id){
  const a = allApps.find(x=>x.id===id);
  if(!a) return;
  const icon  = a.icon_url ? `<img src="${a.icon_url}"/>` : (a.icon_emoji||'📦');
  const price = a.price>0 ? a.price+' ₽' : 'Бесплатно';
  const rating = a.rating ? `⭐ ${a.rating.toFixed(1)}` : '⭐ Новое';
  const {data:reviews} = await sb.from('app_reviews').select('*,profiles(name,avatar,avatar_url)').eq('app_id',id).order('created_at',{ascending:false}).limit(3);

  showModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="app-detail-head">
      <div class="app-detail-icon">${icon}</div>
      <div class="app-detail-info">
        <div class="app-detail-name">${esc(a.name)}</div>

async function startInstall(id){
  const a = allApps.find(x=>x.id===id);
  if(!a) return;
  if(a.price>0){
    closeModal();
    openPayment(a);
    return;
  }
  closeModal();
  await doDownload(a);
}

async function doDownload(a){
  // Показываем progress overlay
  const dlRoot = document.getElementById('dl-root');
  const icon = a.icon_url ? `<img src="${a.icon_url}" style="width:56px;height:56px;border-radius:16px;object-fit:cover"/>` : (a.icon_emoji||'📦');
  dlRoot.innerHTML = `<div class="dl-overlay">
    <div class="dl-card">
      <span class="dl-icon">${icon}</span>
      <div class="dl-name">${esc(a.name)}</div>
      <div class="dl-status" id="dl-status">Подготовка к загрузке...</div>
      <div class="dl-bar-wrap"><div class="dl-bar" id="dl-bar"></div></div>
      <div class="dl-pct" id="dl-pct">0%</div>
    </div>
  </div>`;

  // Анимируем прогресс
  let pct = 0;
  const bar = document.getElementById('dl-bar');
  const pctEl = document.getElementById('dl-pct');
  const statusEl = document.getElementById('dl-status');
  const statuses = ['Подготовка...','Соединение...','Загрузка...','Установка...','Готово!'];
  
  const interval = setInterval(async ()=>{
    pct += Math.random()*18 + 5;
    if(pct>100) pct=100;
    if(bar) bar.style.width = pct+'%';
    if(pctEl) pctEl.textContent = Math.floor(pct)+'%';
    const si = Math.floor((pct/100)*4);
    if(statusEl) statusEl.textContent = statuses[Math.min(si,4)];
    if(pct>=100){
      clearInterval(interval);
      // Записываем установку
      await sb.from('app_installs').upsert({user_id:me.id,app_id:a.id},{onConflict:'user_id,app_id'});
      await sb.rpc('increment_installs',{appid:a.id}).catch(()=>{
        sb.from('market_apps').update({install_count:(a.install_count||0)+1}).eq('id',a.id);
      });
      a.install_count = (a.install_count||0)+1;
      setTimeout(()=>{
        dlRoot.innerHTML='';
        // Если есть файл — открываем
        if(a.file_url){ window.open(a.file_url,'_blank'); }
        else { alert('✅ '+a.name+' установлено!'); }
      },600);
    }
  },120);
}

function selectPayMethod(method){
  selectedPayMethod = method;
  ['card','sbp','barada'].forEach(m=>{
    document.getElementById('pm-'+m)?.classList.toggle('selected',m===method);
    const chk = document.getElementById('pmc-'+m);
    if(chk) chk.textContent = m===method ? '✓' : '';
  });
  document.getElementById('card-form').classList.toggle('show',method==='card');
  document.getElementById('sbp-info').style.display = method==='sbp'?'block':'none';
  document.getElementById('barada-info').style.display = method==='barada'?'block':'none';
}

function fmtCard(el){
  let v = el.value.replace(/\D/g,'').slice(0,16);
  el.value = v.replace(/(.{4})/g,'$1 ').trim();
}
function fmtExp(el){
  let v = el.value.replace(/\D/g,'').slice(0,4);
  if(v.length>=2) v = v.slice(0,2)+'/'+v.slice(2);
  el.value = v;
}

async function processPayment(appId, price){
  if(selectedPayMethod==='barada'){alert('🪙 Барада Баланс в разработке!');return;}
  if(selectedPayMethod==='sbp'){
    // Имитируем СБП
    closeModal();
    showModal(`<div class="modal" onclick="event.stopPropagation()">
      <div class="modal-handle"></div>
      <h2>⚡ Оплата СБП</h2>
      <div style="text-align:center;padding:20px">
        <div style="font-size:80px;margin-bottom:14px">📱</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">Открой своё банковское приложение</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:20px">и отсканируй QR-код или перейди по ссылке</div>
        <div style="background:var(--bg2);border-radius:16px;padding:20px;margin-bottom:16px">
          <div style="font-size:11px;color:var(--text2);margin-bottom:8px">Сумма к оплате</div>
          <div style="font-size:28px;font-weight:900;color:var(--c1)">${price} ₽</div>
        </div>
        <button class="btn" onclick="confirmPayment('${appId}')">✅ Я оплатил</button>
      </div>
      <div class="m-foot"><button class="btn-cancel" onclick="closeModal()">Отмена</button></div>
    </div>`);
    return;
  }
  // Карта — проверяем поля
  const num = document.getElementById('c-number')?.value.replace(/\s/g,'');
  const exp = document.getElementById('c-exp')?.value;
  const cvv = document.getElementById('c-cvv')?.value;
  const name= document.getElementById('c-name')?.value;
  if(!num||num.length<16){alert('Введи номер карты');return;}
  if(!exp||exp.length<5){alert('Введи срок карты');return;}
  if(!cvv||cvv.length<3){alert('Введи CVV');return;}
  if(!name){alert('Введи имя');return;}
  // Симулируем обработку
  const btn = document.querySelector('.modal .btn:last-child');
  if(btn){btn.textContent='Обработка...';btn.disabled=true;}
  await new Promise(r=>setTimeout(r,2000));
  await confirmPayment(appId);
}

async function confirmPayment(appId){
  closeModal();
  const a = allApps.find(x=>x.id===appId);
  // Записываем покупку
  await sb.from('app_purchases').upsert({user_id:me.id,app_id:appId,amount:a?.price||0},{onConflict:'user_id,app_id'});
  await sb.from('app_installs').upsert({user_id:me.id,app_id:appId},{onConflict:'user_id,app_id'});
  if(a) a.install_count = (a.install_count||0)+1;
  await doDownload(a||{id:appId,name:'Приложение',icon_emoji:'📦'});
}

async function handleIconUpload(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ alert('Иконка должна быть меньше 2 MB'); return; }
  const box = document.getElementById('icon-upload-box');
  box.innerHTML = `<div class="upload-icon spin">⏳</div><div class="upload-label">Загружаем...</div>`;
  try{
    const path = `icons/${me.id}/${Date.now()}_${file.name}`;
    const {data,error} = await sb.storage.from('market-files').upload(path,file,{upsert:true});
    if(error) throw error;
    const {data:{publicUrl}} = sb.storage.from('market-files').getPublicUrl(path);
    window._iconUrl = publicUrl;
    box.innerHTML = `<img class="upload-preview" src="${publicUrl}"/><div class="upload-filename">✅ Иконка загружена</div>`;
  }catch(e){
    box.innerHTML = `<div class="upload-icon">🖼️</div><div class="upload-label">Ошибка: ${esc(e.message)}</div>`;
  }
}

async function handleGameFileUpload(input){
  const file = input.files[0];
  if(!file) return;
  const box = document.getElementById('file-upload-box');
  const pwrap = document.getElementById('file-progress-wrap');
  const pbar = document.getElementById('file-progress-bar');
  box.innerHTML = `<div class="upload-icon pulse">📦</div><div class="upload-label">Загружаем ${esc(file.name)}...</div>`;
  pwrap.style.display='block';
  
  // Симулируем прогресс пока грузим
  let fakePct = 0;
  const pi = setInterval(()=>{ fakePct=Math.min(fakePct+5,90); if(pbar) pbar.style.width=fakePct+'%'; },200);
  
  try{
    const path = `games/${me.id}/${Date.now()}_${file.name}`;
    const {data,error} = await sb.storage.from('market-files').upload(path,file,{upsert:true});
    clearInterval(pi);
    if(error) throw error;
    const {data:{publicUrl}} = sb.storage.from('market-files').getPublicUrl(path);
    window._fileUrl = publicUrl;
    window._fileSize = file.size;
    if(pbar) pbar.style.width='100%';
    box.innerHTML = `<div class="upload-icon">✅</div><div class="upload-filename">${esc(file.name)}</div><div style="font-size:10px;color:var(--text2);margin-top:4px">${fmtSize(file.size)}</div>`;
    // Вставляем url в поле
    const urlField = document.getElementById('pub-url');
    if(urlField) urlField.value = publicUrl;
  }catch(e){
    clearInterval(pi);
    box.innerHTML = `<div class="upload-icon">❌</div><div class="upload-label">Ошибка: ${esc(e.message)}</div>`;
    pwrap.style.display='none';
  }
}

async function submitApp(editId){
  const name  = document.getElementById('pub-name')?.value.trim();
  const type  = document.getElementById('pub-type')?.value;
  const cat   = document.getElementById('pub-cat')?.value;
  const desc  = document.getElementById('pub-desc')?.value.trim();
  const ver   = document.getElementById('pub-ver')?.value.trim()||'1.0.0';
  const icon  = document.getElementById('pub-icon')?.value.trim()||'📦';
  const url   = window._fileUrl || document.getElementById('pub-url')?.value.trim();
  const price = window._isFree ? 0 : (parseFloat(document.getElementById('pub-price')?.value)||0);
  const iconUrl = window._iconUrl||null;
  const fileSize = window._fileSize||null;

  if(!name){alert('Введи название');return;}
  
  const btn = document.getElementById('pub-submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Публикуем...';}

  const payload={name,type,category:cat,description:desc,version:ver,icon_emoji:icon,
    icon_url:iconUrl,file_url:url,price,file_size:fileSize,developer_id:me.id,status:'published'};
  let error;
  if(editId){({error}=await sb.from('market_apps').update(payload).eq('id',editId));}
  else{({error}=await sb.from('market_apps').insert(payload));}
  
  if(error){alert('Ошибка: '+error.message);if(btn){btn.disabled=false;btn.textContent='Опубликовать 🚀';}return;}
  await loadApps();
  closeModal();
  renderTab(currentTab);
  // Показываем успех
  setTimeout(()=>alert('🚀 Опубликовано!'),100);
}

async function deleteApp(id){
  if(!confirm('Удалить приложение? Это нельзя отменить.')) return;
  await sb.from('market_apps').delete().eq('id',id).eq('developer_id',me.id);
  await loadApps();
  renderMyApps();
}

// ── VIEWPORT FIX ──────────────────────────────────────────────────
(function(){
  function fix(){
    const h=(window.visualViewport?window.visualViewport.height:window.innerHeight)+'px';
    const app=document.getElementById('app');
    const auth=document.getElementById('auth');
    if(app) app.style.height=h;
    if(auth) auth.style.height=h;
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',fix);
    window.visualViewport.addEventListener('scroll',fix);
  }
  window.addEventListener('resize',fix);
  fix();
  document.addEventListener('DOMContentLoaded',fix);
})();

// ── SERVICE WORKER ────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── INIT ─────────────────────────────────────────────────────────
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){
    const {data:profile}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
    if(profile){me=profile;await startApp();}
  }
})();
</script>
